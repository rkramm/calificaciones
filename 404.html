<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirigiendo...</title>
    <script>
        // GitHub Pages 404 redirect handler
        // Maneja redirecciones de caso insensible y rutas SPA

        let path = window.location.pathname;
        let search = window.location.search;
        let hash = window.location.hash;

        // Caso 1: /calificaciones → /Calificaciones
        if (path.toLowerCase().includes('/calificaciones')) {
            // Reemplazar /calificaciones con /Calificaciones (cualquier caso)
            path = path.replace(/\/calificaciones/i, '/Calificaciones');
            window.location.href = window.location.protocol + '//' + window.location.host + path + search + hash;
        }
        // Caso 2: Otras rutas no encontradas → redirigir a index.html
        else {
            // Extraer el directorio base (e.g., /Calificaciones/)
            const pathParts = path.split('/').filter(Boolean);
            if (pathParts.length > 0) {
                const baseDir = '/' + pathParts[0] + '/';
                window.location.href = window.location.protocol + '//' + window.location.host + baseDir + 'index.html' + search + hash;
            } else {
                window.location.href = window.location.protocol + '//' + window.location.host + '/' + search + hash;
            }
        }
    </script>
</head>
<body>
    <p>Redirigiendo...</p>
</body>
</html>
